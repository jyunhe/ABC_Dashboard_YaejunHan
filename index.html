<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ABC Logistics - Inventory Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      color: #333;
    }

    nav {
      background-color: #1f3b4d;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      font-weight: bold;
      font-size: 1.1rem;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 15px;
      font-size: 0.95rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background-color: #ffffff;
      padding: 20px 25px 30px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 1.6rem;
      color: #1f3b4d;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"] {
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      min-width: 180px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      background-color: #1f3b4d;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button:hover {
      background-color: #24475c;
    }

    .error-message {
      color: #c0392b;
      font-size: 0.9rem;
      margin-top: 5px;
      min-height: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      margin-bottom: 15px;
      font-size: 0.95rem;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f0f3f7;
    }

    .table-header-row {
      background-color: #f0f3f7;
    }

    .actions-row {
      text-align: right;
    }

    .chart-container {
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      form {
        flex-direction: column;
        align-items: stretch;
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">ABC Logistics - Inventory Command Center</div>
    <div>
      <a href="index.html">Dashboard</a>
      <a href="about.html">Developer Profile</a>
    </div>
  </nav>

  <div class="container">
    <h1>Inventory Dashboard</h1>
    <p>Track items in the warehouse and monitor low stock levels at a glance.</p>

    <form id="item-form">
      <div>
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" placeholder="e.g., Pallet of Boxes" />
      </div>
      <div>
        <label for="item-quantity">Quantity</label>
        <input type="number" id="item-quantity" placeholder="e.g., 25" />
      </div>
      <div>
        <button type="submit">Add Item</button>
      </div>
    </form>

    <div class="error-message" id="error-message"></div>

    <table id="items-table">
      <thead>
        <tr class="table-header-row">
          <th>Item Name</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody id="items-tbody">
        <!-- Items will be injected here -->
      </tbody>
    </table>

    <div class="actions-row">
      <button id="clear-all-btn">Clear All Items</button>
    </div>

    <div class="chart-container">
      <h2>Inventory Visualization</h2>
      <canvas id="inventoryChart"></canvas>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'inventoryItems';

    let items = [];
    let chart = null;

    const form = document.getElementById('item-form');
    const itemNameInput = document.getElementById('item-name');
    const itemQuantityInput = document.getElementById('item-quantity');
    const errorMessageEl = document.getElementById('error-message');
    const itemsTbody = document.getElementById('items-tbody');
    const clearAllBtn = document.getElementById('clear-all-btn');
    const chartCanvas = document.getElementById('inventoryChart');

    function loadFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          items = JSON.parse(stored);
        } catch (e) {
          items = [];
        }
      }
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function renderTable() {
      itemsTbody.innerHTML = '';
      items.forEach(item => {
        const tr = document.createElement('tr');
        const tdName = document.createElement('td');
        const tdQty = document.createElement('td');

        tdName.textContent = item.name;
        tdQty.textContent = item.quantity;

        tr.appendChild(tdName);
        tr.appendChild(tdQty);
        itemsTbody.appendChild(tr);
      });
    }

    function renderChart() {
      const labels = items.map(item => item.name);
      const data = items.map(item => item.quantity);

      const backgroundColors = items.map(item =>
        item.quantity < 10 ? 'red' : '#4e79a7'
      );

      if (chart) {
        chart.destroy();
      }

      chart = new Chart(chartCanvas, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Quantity',
            data: data,
            backgroundColor: backgroundColors
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                precision: 0
              }
            }
          }
        }
      });
    }

    function showError(message) {
      errorMessageEl.textContent = message;
    }

    function clearError() {
      errorMessageEl.textContent = '';
    }

    function isDuplicateName(name) {
      const lower = name.trim().toLowerCase();
      return items.some(item => item.name.toLowerCase() === lower);
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const name = itemNameInput.value.trim();
      const quantityRaw = itemQuantityInput.value.trim();

      if (!name) {
        showError('Item name cannot be empty.');
        return;
      }

      if (quantityRaw === '') {
        showError('Quantity is required.');
        return;
      }

      const quantity = Number(quantityRaw);

      if (!Number.isFinite(quantity) || isNaN(quantity)) {
        showError('Quantity must be a valid number.');
        return;
      }

      if (!Number.isInteger(quantity) || quantity < 0) {
        showError('Quantity must be a non-negative whole number.');
        return;
      }

      if (isDuplicateName(name)) {
        showError('This item already exists. Duplicate items are not allowed.');
        return;
      }

      items.push({ name, quantity });
      saveToStorage();
      renderTable();
      renderChart();
      clearError();

      itemNameInput.value = '';
      itemQuantityInput.value = '';
    });

    clearAllBtn.addEventListener('click', function () {
      items = [];
      saveToStorage();
      renderTable();
      if (chart) {
        chart.destroy();
        chart = null;
      }
      clearError();
    });

    function init() {
      loadFromStorage();
      renderTable();
      if (items.length > 0) {
        renderChart();
      }
    }

    init();
  </script>
</body>
</html>
